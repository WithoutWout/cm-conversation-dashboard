name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "v__VERSION__"
          releaseBody: |
            ## Download

            ### Windows (geen admin nodig, geen installatie) — aanbevolen
            - Klik hieronder op **Assets** en download:  
              `Conversational-AI-Dashboard-portable-${{ github.ref_name }}-x64.zip`  
            - Pak het zip-bestand uit en dubbelklik op `app.exe`.  
            - Geen installatie nodig. Je kunt het bestand op elke locatie bewaren.  

            > ⚠️ Let op: de app is niet gecode‑signed. Windows Defender/SmartScreen kan een waarschuwing tonen.  
            > Klik op **"Meer informatie" → "Toch uitvoeren"** om de app te starten.

            ---

            ### macOS
            - Download het `.dmg`‑bestand.  
            - Open het `.dmg`, sleep de app naar `Applications` en open hem via `Launchpad`/`Programma's`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Zip portable Windows binary
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "app.exe" |
            Where-Object { $_.FullName -match "\\release\\" -and $_.FullName -notmatch "\\(deps|build|examples)\\" } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "app.exe not found"; exit 1 }
          Write-Host "Found binary: $($exe.FullName)"
          $version = "${{ github.ref_name }}"
          $zipName = "Conversational-AI-Dashboard-portable-${version}-x64.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      - name: Upload portable zip to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
