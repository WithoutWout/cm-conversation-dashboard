name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Save the cache even if a later step (e.g. notarization) fails —
          # otherwise a full crate recompile is thrown away on every retry.
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            ## What's new in v0.9.1

            ### Collections: build knowledge-tool exports for HALO
            Curate a set of Articles and Dialogs from the Content tab and export them as ready-to-import JSON for CM.com HALO's knowledge tool.

            - **Select and collect** — turn on **Select** in the Content tab to check off Articles/Dialogs (or use **Select all** to grab everything matching your current search/filter), then add them to a named Collection.
            - **Export as trigger/content JSON** — pick a Collection, hit Export, and save the file. Only genuinely reachable content is included, matching how the CM.com bot itself would actually serve it to users.
            - **Dialogs export their real entry points** — if a Dialog is normally only reached through an Article, that Article's questions become the export trigger for the Dialog's content, so dialogs that are pure routers still produce usable rows.
            - **Smart filters** — set up reusable rules to exclude junk or test content, matching on trigger phrase, answer text, or context (like escalation group), with plain text or regex.
            - **Filtered Out view** — see exactly which rows a smart filter is removing and why, so a filter that's too broad doesn't quietly eat content you wanted.
            - **Search inside a Collection** — preview and search a Collection's actual exported content before you save it.

            ### Release readiness
            - Bumped the application version to **0.9.1** across the Tauri and package metadata.

            ---

            ## Download

            ### Windows (geen admin nodig, geen installatie) — aanbevolen
            - Klik hieronder op **Assets** en download:  
              `Conversational-AI-Dashboard-portable-${{ github.ref_name }}-x64.zip`  
            - Pak het zip-bestand uit en dubbelklik op `CAIDashboard.exe`.  
            - Geen installatie nodig. Je kunt het bestand op elke locatie bewaren.  

            > ⚠️ Let op: de app is niet gecode‑signed. Windows Defender/SmartScreen kan een waarschuwing tonen.  
            > Klik op **"Meer informatie" → "Toch uitvoeren"** om de app te starten.

            ---

            ### macOS
            - Download het `.dmg`‑bestand.  
            - Open het `.dmg`, sleep de app naar `Applications` en open hem via `Launchpad`/`Programma's`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Zip portable Windows binary
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "CAIDashboard.exe" |
            Where-Object { $_.FullName -match "\\release\\" -and $_.FullName -notmatch "\\(deps|build|examples)\\" } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "CAIDashboard.exe not found"; exit 1 }
          Write-Host "Found binary: $($exe.FullName)"
          $version = "${{ github.ref_name }}"
          $zipName = "Conversational-AI-Dashboard-portable-${version}-x64.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      - name: Upload portable zip to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
