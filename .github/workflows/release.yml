name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Save the cache even if a later step (e.g. notarization) fails —
          # otherwise a full crate recompile is thrown away on every retry.
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            ## What's new in v0.10.0

            ### Automated Analytics API import
            Interaction logs no longer have to be downloaded by hand, one day at a time, from the CM.com portal.

            - **Import → Analytics API** — pick a date/time range (with a **Now** shortcut and a calendar that marks which days are already in your database) and the app downloads and imports every day in the range itself.
            - **Respects the API's limits automatically** — requests never exceed 24 hours, only one download is ever in flight, and a day that times out is transparently split into smaller windows and retried.
            - **Efficient pipeline** — the next day downloads while the current one imports, so waiting time is minimised.
            - **Safe by construction** — duplicate detection reuses the app's existing import logic, so re-running an import (or retrying after a failure) never creates duplicate data. A day that was only partly imported is detected per hour and completed, not skipped.
            - **Clear progress and control** — see exactly what's downloading, what's importing, and what's done; cancel at any point and keep everything imported so far; retry from the day that failed.
            - **Credentials live in Settings** — add your Analytics API client ID and secret once under Settings → Conversations.
            - The manual CSV import is still there, right next to it, for when you'd rather use a downloaded file.

            ### Content selection, redesigned
            - The Collections select bar no longer takes up space when you're not using it — turn it on with a single icon next to the search options, and a compact bar appears only while you're selecting.
            - Selecting is now as simple as clicking a card — no more hunting for a small checkbox.
            - **Hover preview** — while selecting, hover an Article or Dialog to see exactly what it would contribute to your Collection (its trigger phrases and response text) before you select it, including a clear note when an item would add nothing at all.

            ---

            ## Download

            ### Windows (geen admin nodig, geen installatie) — aanbevolen
            - Klik hieronder op **Assets** en download:
              `Conversational-AI-Dashboard-portable-${{ github.ref_name }}-x64.zip`
            - Pak het zip-bestand uit en dubbelklik op `CAIDashboard.exe`.
            - Geen installatie nodig. Je kunt het bestand op elke locatie bewaren.

            > ⚠️ Let op: de app is niet gecode‑signed. Windows Defender/SmartScreen kan een waarschuwing tonen.
            > Klik op **"Meer informatie" → "Toch uitvoeren"** om de app te starten.

            ---

            ### macOS
            - Download het `.dmg`‑bestand.
            - Open het `.dmg`, sleep de app naar `Applications` en open hem via `Launchpad`/`Programma's`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Zip portable Windows binary
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "CAIDashboard.exe" |
            Where-Object { $_.FullName -match "\\release\\" -and $_.FullName -notmatch "\\(deps|build|examples)\\" } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "CAIDashboard.exe not found"; exit 1 }
          Write-Host "Found binary: $($exe.FullName)"
          $version = "${{ github.ref_name }}"
          $zipName = "Conversational-AI-Dashboard-portable-${version}-x64.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      - name: Upload portable zip to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
