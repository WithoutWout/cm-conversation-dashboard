name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "v0.8.0"
          releaseBody: |
            ## What's new in v0.8.0

            ### Content search accuracy
            - Content search now evaluates context filters and text queries against the same response output, so results are much more predictable.
            - **Responses only** (`¬T`) now truly searches response text only, excluding IDs, titles, descriptions, node names, and entity enrichment.
            - **ND** now means **Exclude non-default responses from search** and only affects active text searches.
            - Invalid regex searches now show a clear error state instead of looking like a valid zero-result search.

            ### Reachability and context clarity
            - Content detail views now only mark a response as **Unreachable** when it is not the default response and has no context condition.
            - Contextual responses that are reachable through user context are no longer presented as non-default/unreachable in result cards.
            - Matching contextual responses can show compact snippets on result cards, making it easier to understand why an item appeared.

            ### Article and dialog relationships
            - Article result cards now show clickable **Dialog Link** and **Transactional Dialog** chips inline.
            - Dialog result cards can show which articles reference them, giving a clearer article -> dialog -> article overview.
            - The **Share Content** modal now includes a **Grouped** view that groups Articles, Dialogs, and Transactional Dialogs, always sorted by ID.
            - Grouped sharing makes dialog-to-article references easier to scan, for example `dn-123 -> qa-456`.

            ### Documentation and release readiness
            - Updated project instructions for Codex and GitHub Copilot with the latest content search, Entities, relationship, and sharing behavior.
            - Bumped the application version to **0.8.0** across the Tauri and package metadata.

            ---

            ## Download

            ### Windows (geen admin nodig, geen installatie) — aanbevolen
            - Klik hieronder op **Assets** en download:  
              `Conversational-AI-Dashboard-portable-${{ github.ref_name }}-x64.zip`  
            - Pak het zip-bestand uit en dubbelklik op `CAIDashboard.exe`.  
            - Geen installatie nodig. Je kunt het bestand op elke locatie bewaren.  

            > ⚠️ Let op: de app is niet gecode‑signed. Windows Defender/SmartScreen kan een waarschuwing tonen.  
            > Klik op **"Meer informatie" → "Toch uitvoeren"** om de app te starten.

            ---

            ### macOS
            - Download het `.dmg`‑bestand.  
            - Open het `.dmg`, sleep de app naar `Applications` en open hem via `Launchpad`/`Programma's`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Zip portable Windows binary
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "CAIDashboard.exe" |
            Where-Object { $_.FullName -match "\\release\\" -and $_.FullName -notmatch "\\(deps|build|examples)\\" } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "CAIDashboard.exe not found"; exit 1 }
          Write-Host "Found binary: $($exe.FullName)"
          $version = "${{ github.ref_name }}"
          $zipName = "Conversational-AI-Dashboard-portable-${version}-x64.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      - name: Upload portable zip to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
