name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            ## What's new in v0.9.0

            ### AI-assisted conversation analysis
            - New **Export for AI** button in the Conversations view exports the current search results as a structured file for analysis in ChatGPT, Claude, or another LLM.
            - Each exported conversation includes the full chat trace and any feedback (positive/negative), paired with the turn that caused it.
            - Export honors the exact same filters, date range, context filters, and ID search as the on-screen results, so what you export matches what you see.

            ### Faster search and imports
            - Conversation search and CSV import are significantly faster, especially on larger databases and imports.
            - Content search (Articles, Dialogs, Transactional Dialogs, Entities) is faster too: repeated searches and tab switches now reuse cached results instead of re-scanning content from scratch.

            ### UI polish
            - Header, file tags, and chat layout now respond better to narrow windows, with improved wrapping and overflow handling instead of clipped or cramped content.
            - Clearer error states in chat and search views.

            ### Documentation
            - README now documents the Flagged View (saving, annotating, and organizing flagged conversation turns) and the Share Content export formats.
            - Windows install instructions clarify that the download is a portable `.exe`, not an installer.

            ### Release readiness
            - Bumped the application version to **0.9.0** across the Tauri and package metadata.

            ---

            ## Download

            ### Windows (geen admin nodig, geen installatie) — aanbevolen
            - Klik hieronder op **Assets** en download:  
              `Conversational-AI-Dashboard-portable-${{ github.ref_name }}-x64.zip`  
            - Pak het zip-bestand uit en dubbelklik op `CAIDashboard.exe`.  
            - Geen installatie nodig. Je kunt het bestand op elke locatie bewaren.  

            > ⚠️ Let op: de app is niet gecode‑signed. Windows Defender/SmartScreen kan een waarschuwing tonen.  
            > Klik op **"Meer informatie" → "Toch uitvoeren"** om de app te starten.

            ---

            ### macOS
            - Download het `.dmg`‑bestand.  
            - Open het `.dmg`, sleep de app naar `Applications` en open hem via `Launchpad`/`Programma's`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Zip portable Windows binary
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "CAIDashboard.exe" |
            Where-Object { $_.FullName -match "\\release\\" -and $_.FullName -notmatch "\\(deps|build|examples)\\" } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "CAIDashboard.exe not found"; exit 1 }
          Write-Host "Found binary: $($exe.FullName)"
          $version = "${{ github.ref_name }}"
          $zipName = "Conversational-AI-Dashboard-portable-${version}-x64.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      - name: Upload portable zip to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
