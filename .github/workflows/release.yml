name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Save the cache even if a later step (e.g. notarization) fails —
          # otherwise a full crate recompile is thrown away on every retry.
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: |
            ## What's new in v0.9.1

            ### Collections: curate and export content for HALO
            - Select Articles and Dialogs in the Content tab (toggle **Select** to reveal checkboxes; **Select page** or **Select all** for bulk selection) and group them into named **Collections**.
            - Export a collection as `trigger`/`content` JSON, ready for CM.com HALO's knowledge tool — pick a filename and save location via a native dialog.
            - Export automatically excludes unreachable content (non-default answers with no real context), walks dialog entry points via their referencing Articles so routed-into dialogs still produce real trigger/content pairs, and merges rows that end up with identical content into one, combining their triggers.
            - **Smart filters** let you exclude junk or test content from every export — by entity (trigger phrase), by content (answer text), or by context (e.g. escalation group) — with plain substring or regex matching.
            - A new **Filtered Out** view shows exactly which rows a smart filter is dropping and why, so a filter meant to catch one thing doesn't silently catch something else.
            - **View content** on any collection lets you search its actual exported rows before you export.

            ### Release readiness
            - Bumped the application version to **0.9.1** across the Tauri and package metadata.

            ---

            ## Download

            ### Windows (geen admin nodig, geen installatie) — aanbevolen
            - Klik hieronder op **Assets** en download:  
              `Conversational-AI-Dashboard-portable-${{ github.ref_name }}-x64.zip`  
            - Pak het zip-bestand uit en dubbelklik op `CAIDashboard.exe`.  
            - Geen installatie nodig. Je kunt het bestand op elke locatie bewaren.  

            > ⚠️ Let op: de app is niet gecode‑signed. Windows Defender/SmartScreen kan een waarschuwing tonen.  
            > Klik op **"Meer informatie" → "Toch uitvoeren"** om de app te starten.

            ---

            ### macOS
            - Download het `.dmg`‑bestand.  
            - Open het `.dmg`, sleep de app naar `Applications` en open hem via `Launchpad`/`Programma's`.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Zip portable Windows binary
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "CAIDashboard.exe" |
            Where-Object { $_.FullName -match "\\release\\" -and $_.FullName -notmatch "\\(deps|build|examples)\\" } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "CAIDashboard.exe not found"; exit 1 }
          Write-Host "Found binary: $($exe.FullName)"
          $version = "${{ github.ref_name }}"
          $zipName = "Conversational-AI-Dashboard-portable-${version}-x64.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_ENV

      - name: Upload portable zip to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
